sonar.projectKey=hisamist_sharetrip
sonar.organization=hisamist

# Sources and tests
sonar.sources=src
sonar.tests=tests
sonar.inclusions=src/**/*.py
sonar.test.inclusions=tests/**/*.py

# Python version
sonar.python.version=3.11

# Coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Quality Gate thresholds (enforced in SonarCloud UI)
# - 0 bugs, 0 vulnerabilities
# - duplication < 3%
# - coverage >= 70%

# Exclude generated and migration files from analysis
sonar.exclusions=alembic/**,**/__pycache__/**,**/*.pyc

# Encoding
sonar.sourceEncoding=UTF-8
