# Production — lancer avec :
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:

  api:
    image: ghcr.io/hisamist/sharetrip:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
    read_only: true
    tmpfs:
      - /tmp
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  db:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
