name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PARALLEL JOBS
  # ═══════════════════════════════════════════════════════════════

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install .[dev]
      - run: python -m ruff format --check .
      - run: task lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install .[dev]
      - run: python -m pytest tests/unit/ --cov=src --cov-report=xml --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install .[dev]
      - run: python -m pytest tests/integration/

  security-deps:
    name: Scan Dependencies (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  # ═══════════════════════════════════════════════════════════════
  # SEQUENTIAL JOBS
  # ═══════════════════════════════════════════════════════════════

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install .
      - run: python -c "from sharetrip.main import app; print('Build OK')"

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build image with layer cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sharetrip:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Save image as artifact
        run: docker save sharetrip:ci -o sharetrip.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: sharetrip.tar

  security-image:
    name: Scan Docker Image (Trivy)
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i sharetrip.tar
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: sharetrip:ci
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
