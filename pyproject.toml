[project]
name = "sharetrip"
version = "0.1.0"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "pydantic-settings",
    "sqlalchemy",
    "alembic",
    "redis",
    "httpx",
    "psycopg2-binary",
    "bcrypt",
    "pyjwt",
    "pydantic[email]>=2.0",
    "fpdf2",
    "slowapi",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
    "taskipy",
    "httpx",
    "pre-commit",
]

[tool.taskipy.tasks]
# Lancer l'application en mode développement
run = "uvicorn src.sharetrip.main:app --reload"

# Run all tests using pytest
test = "python -m pytest"

# Run tests and generate a coverage report for the 'src' module
cov = "python -m pytest --cov=src --cov-fail-under=80"

# Check code quality and style using Ruff (Linter)
lint = "python -m ruff check ."
lint-fix = "python -m ruff check . --fix"

# Automatically fix linting errors and reformat code
format = "python -m ruff format ."

# Alembic — migrations
migrate = "alembic upgrade head"
migrate-down = "alembic downgrade -1"
migrate-status = "alembic current"
migrate-history = "alembic history --verbose"
makemigration = "alembic revision --autogenerate -m"

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["alembic/"]          # auto-generated migrations — not our code to lint

[tool.ruff.lint]
# E/W : PEP 8 style (indentation, whitespace, blank lines)
# F   : pyflakes — unused imports, undefined names
# I   : isort   — consistent import ordering
# B   : bugbear — likely bugs and bad design patterns
# UP  : pyupgrade — enforces modern Python syntax (e.g. X | Y instead of Union)
# C90 : mccabe  — flags functions with cyclomatic complexity > 10
select = ["E", "W", "F", "I", "B", "UP", "C90"]
ignore = [
    "B008",  # FastAPI's Depends() in default args is the intended DI pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]      # assert is the standard assertion mechanism in pytest

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
